<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中间塔防</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 2px solid #4a4a6a;
            background: #16213e;
        }
        #towerSelection {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #towerSelection.hidden {
            display: none;
        }
        .selection-title {
            color: #fff;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(74, 144, 217, 0.5);
        }
        .tower-cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }
        .tower-card {
            width: 140px;
            padding: 15px;
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .tower-card:hover {
            transform: translateY(-5px);
            border-color: #4a90d9;
            box-shadow: 0 5px 20px rgba(74, 144, 217, 0.3);
        }
        .tower-card.selected {
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
        }
        .tower-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 10px;
            border-radius: 8px;
        }
        .tower-name {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .tower-desc {
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 10px;
            min-height: 30px;
        }
        .tower-stats {
            color: #6b7280;
            font-size: 11px;
            text-align: left;
        }
        .tower-stats div {
            margin: 2px 0;
        }
        .tower-skill {
            color: #a78bfa;
            font-size: 11px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #4a4a6a;
        }
        .start-btn {
            margin-top: 30px;
            padding: 12px 40px;
            font-size: 18px;
            background: linear-gradient(145deg, #4ade80, #22c55e);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }
        .start-btn:disabled {
            background: #4a4a6a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .back-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 14px;
            background: #4a4a6a;
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #5a5a7a;
        }
        .confirm-btn {
            margin-top: 15px;
            padding: 12px 40px;
            font-size: 18px;
            background: linear-gradient(145deg, #4ade80, #22c55e);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .confirm-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }
        .confirm-btn:disabled {
            background: #4a4a6a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .position-hint {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 10px;
        }
        #positionSelection {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            z-index: 10;
            pointer-events: none;
        }
        #positionSelection > * {
            pointer-events: auto;
        }
        #positionSelection.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="towerSelection">
            <h1 class="selection-title">选择你的初始塔</h1>
            <div class="tower-cards" id="towerCards"></div>
            <button class="start-btn" id="startBtn" disabled>下一步</button>
        </div>
        <div id="positionSelection" class="hidden">
            <h1 class="selection-title">选择放置位置</h1>
            <p class="position-hint">点击地图上的格子放置你的塔</p>
            <button class="confirm-btn" id="confirmBtn" disabled>开始游戏</button>
            <button class="back-btn" id="backBtn">返回</button>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
